<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>命运の食堂 🐶⚡</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #FFF8F0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 40px;
    color: #5D4037;
    overflow-x: hidden;
  }

  /* Dog mascot SVG */
  .dog-mascot {
    width: 80px;
    height: 80px;
    margin-bottom: 4px;
    transition: transform 0.3s;
  }
  .dog-mascot.excited { animation: dogJump 0.4s ease infinite; }
  .dog-mascot.happy { animation: dogWag 0.6s ease infinite; }

  @keyframes dogJump {
    0%, 100% { transform: translateY(0) rotate(-3deg); }
    50% { transform: translateY(-12px) rotate(3deg); }
  }
  @keyframes dogWag {
    0%, 100% { transform: rotate(-5deg); }
    50% { transform: rotate(5deg); }
  }

  h1 {
    font-size: 24px;
    color: #E65100;
    margin-bottom: 2px;
    letter-spacing: 2px;
  }

  .subtitle {
    font-size: 13px;
    color: #BCAAA4;
    margin-bottom: 18px;
  }

  .subtitle .spark { color: #FFB300; }

  /* People toggle */
  .people-toggle {
    display: flex;
    gap: 0;
    margin-bottom: 16px;
    background: #FFF3E0;
    border-radius: 24px;
    padding: 3px;
    border: 2px solid #FFE0B2;
  }

  .people-btn {
    padding: 8px 22px;
    border-radius: 20px;
    font-size: 14px;
    border: none;
    background: transparent;
    color: #BCAAA4;
    cursor: pointer;
    transition: all 0.25s;
    font-weight: 600;
    -webkit-tap-highlight-color: transparent;
  }

  .people-btn.active {
    background: white;
    color: #E65100;
    box-shadow: 0 2px 8px rgba(230, 81, 0, 0.15);
  }

  /* Filter chips */
  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 20px;
    max-width: 360px;
  }

  .chip {
    padding: 6px 13px;
    border-radius: 16px;
    font-size: 12px;
    border: 2px solid #FFE0B2;
    background: white;
    color: #8D6E63;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .chip.active {
    background: #FF8A65;
    color: white;
    border-color: #FF8A65;
    font-weight: 600;
    box-shadow: 0 2px 8px rgba(255, 138, 101, 0.3);
  }

  /* Main card */
  .slot-card {
    background: white;
    border-radius: 24px;
    padding: 28px 20px 24px;
    width: 100%;
    max-width: 330px;
    text-align: center;
    border: 3px solid #FFE0B2;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }

  /* Doodle corners */
  .slot-card::before {
    content: '✿';
    position: absolute;
    top: 8px; left: 12px;
    font-size: 16px;
    opacity: 0.3;
  }
  .slot-card::after {
    content: '✿';
    position: absolute;
    top: 8px; right: 12px;
    font-size: 16px;
    opacity: 0.3;
  }

  .result-emoji {
    font-size: 64px;
    display: block;
    margin-bottom: 8px;
    transition: transform 0.3s;
  }

  .result-name {
    font-size: 28px;
    font-weight: 800;
    color: #4E342E;
    margin-bottom: 4px;
    min-height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* 中二 dramatic line */
  .chuuni-line {
    font-size: 12px;
    color: #FF8A65;
    font-style: italic;
    margin-bottom: 8px;
    min-height: 18px;
    letter-spacing: 1px;
  }

  .result-tags {
    display: flex;
    gap: 6px;
    justify-content: center;
    flex-wrap: wrap;
    min-height: 26px;
  }

  .tag {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 10px;
    background: #FFF3E0;
    color: #8D6E63;
  }
  .tag.price-low { background: #E8F5E9; color: #2E7D32; }
  .tag.price-mid { background: #FFF3E0; color: #E65100; }
  .tag.price-high { background: #FCE4EC; color: #C62828; }
  .tag.share { background: #E3F2FD; color: #1565C0; }

  /* Spinning state */
  .spinning .result-emoji {
    animation: slotSpin 0.1s linear infinite;
  }
  .spinning .result-name {
    animation: textFlicker 0.08s linear infinite;
  }
  @keyframes slotSpin {
    0% { transform: translateY(-18px); opacity: 0.3; }
    50% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(18px); opacity: 0.3; }
  }
  @keyframes textFlicker {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  /* Landed */
  .landed .result-emoji {
    animation: popIn 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97);
  }
  @keyframes popIn {
    0% { transform: scale(0.3) rotate(-10deg); }
    50% { transform: scale(1.25) rotate(5deg); }
    70% { transform: scale(0.9) rotate(-2deg); }
    100% { transform: scale(1) rotate(0); }
  }

  /* Speech bubble from dog */
  .dog-speech {
    position: relative;
    background: #FFF3E0;
    border: 2px solid #FFE0B2;
    border-radius: 16px;
    padding: 8px 14px;
    font-size: 13px;
    color: #8D6E63;
    margin-bottom: 16px;
    max-width: 280px;
    min-height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .dog-speech::after {
    content: '';
    position: absolute;
    top: -8px;
    left: 50%;
    margin-left: -6px;
    border-left: 6px solid transparent;
    border-right: 6px solid transparent;
    border-bottom: 8px solid #FFF3E0;
  }
  .dog-speech::before {
    content: '';
    position: absolute;
    top: -11px;
    left: 50%;
    margin-left: -7px;
    border-left: 7px solid transparent;
    border-right: 7px solid transparent;
    border-bottom: 9px solid #FFE0B2;
  }

  /* Buttons */
  .spin-btn {
    width: 100%;
    max-width: 330px;
    padding: 14px;
    font-size: 18px;
    font-weight: 700;
    border: 3px solid #FF8A65;
    border-radius: 16px;
    background: linear-gradient(135deg, #FF8A65, #FF6E40);
    color: white;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(255, 110, 64, 0.3);
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
    letter-spacing: 3px;
  }
  .spin-btn:active {
    transform: scale(0.96);
    box-shadow: 0 2px 8px rgba(255, 110, 64, 0.2);
  }
  .spin-btn.is-spinning {
    background: #FFCCBC;
    border-color: #FFCCBC;
    color: white;
    pointer-events: none;
    box-shadow: none;
  }

  .reroll {
    background: white;
    border: 2px dashed #FFAB91;
    color: #FF8A65;
    padding: 9px 18px;
    border-radius: 12px;
    font-size: 13px;
    cursor: pointer;
    margin-top: 12px;
    display: none;
    -webkit-tap-highlight-color: transparent;
    font-weight: 600;
  }
  .reroll:active { background: #FFF3E0; }

  /* History */
  .history {
    margin-top: 20px;
    width: 100%;
    max-width: 330px;
  }
  .history-title {
    color: #BCAAA4;
    font-size: 12px;
    margin-bottom: 8px;
    text-align: center;
  }
  .history-list {
    display: flex;
    gap: 6px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .history-item {
    background: #FFF3E0;
    border-radius: 10px;
    padding: 4px 10px;
    color: #BCAAA4;
    font-size: 13px;
    text-decoration: line-through;
  }
  .history-item:first-child {
    text-decoration: none;
    color: #8D6E63;
    background: #FFE0B2;
  }

  /* Paw prints decoration */
  .paw-deco {
    position: fixed;
    opacity: 0.06;
    font-size: 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Confetti */
  .confetti {
    position: fixed;
    top: -10px;
    border-radius: 2px;
    pointer-events: none;
    z-index: 999;
    animation: confettiFall 2s ease-out forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  .footer {
    margin-top: auto;
    padding-top: 24px;
    color: #D7CCC8;
    font-size: 11px;
  }
</style>
</head>

  "汪汪！快选一个，本汪已经饿了！🦴",

];

const dogSpeechResult = [
  "汪！就是这个！本汪的鼻子从不出错！🐽",
  "汪汪！命运已定！快去吃！🐾",
  "本汪认证✅ 这个超好吃的！",
  "汪！本汪替你尝过了（并没有）很好吃！",

const dogSpeechReroll = [
  "汪？不满意？让本汪再算一卦...🔮",
  "嗯...本汪理解，口味这东西嘛！再来！",
  "汪！挑食不是病，本汪也挑！🐾",
  "好吧好吧，命运可以重来一次！",
];

let history = [];
let currentFilter = "all";
let peopleCount = 1;
let isSpinning = false;
let spinCount = 0;

function setPeople(n) {
  peopleCount = n;
  document.querySelectorAll('.people-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.people) === n);
  });
  // Update dog speech
  if (n === 2) {
    setDogSpeech("汪！两个人！是约会吗？🐾💕");
  } else {
    setDogSpeech("汪！一个人也要好好吃饭哦！🐾");
  }
}

function setDogSpeech(text) {
  document.getElementById('dogSpeech').textContent = text;
}

function setDogMood(mood) {
  const dog = document.getElementById('dogSvg');
  const tongue = document.getElementById('dogTongue');
  dog.className = 'dog-mascot ' + mood;
  tongue.setAttribute('opacity', mood === 'happy' ? '1' : '0');
  if (mood === '') {
    setTimeout(() => { dog.className = 'dog-mascot'; }, 600);
  }
}

// Filter logic
document.getElementById('filters').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  currentFilter = chip.dataset.filter;
});

function getFiltered() {
  let list = foods;
  // Filter by people
  if (peopleCount === 1) list = list.filter(f => f.solo);
  else list = list.filter(f => f.duo);

  // Filter by category
  if (currentFilter === "cheap") list = list.filter(f => f.price === "low");
  else if (currentFilter === "treat") list = list.filter(f => f.price === "high" || f.price === "mid");
  else if (currentFilter !== "all") list = list.filter(f => f.cat === currentFilter);

  // Avoid repeats
  const histNames = history.map(h => h.name);
  const fresh = list.filter(f => !histNames.includes(f.name));
  return fresh.length > 0 ? fresh : list;
}

function spin() {
  if (isSpinning) return;
  isSpinning = true;
  spinCount++;

  const btn = document.getElementById('spinBtn');
  const card = document.getElementById('slotCard');
  const reroll = document.getElementById('rerollBtn');
  
  btn.classList.add('is-spinning');
  btn.textContent = '⚡ 命运转动中... ⚡';
  reroll.style.display = 'none';
  card.className = 'slot-card spinning';
  document.getElementById('chuuniLine').textContent = '';
  
  setDogMood('excited');
  if (spinCount > 1) {
    setDogSpeech(randomPick(dogSpeechReroll));
  } else {
    setDogSpeech("汪汪汪！命运の齿轮转动中...！🔮");
  }

  const pool = getFiltered();
  let ticks = 0;
  const totalTicks = 18 + Math.floor(Math.random() * 10);
  
  const interval = setInterval(() => {
    const rand = pool[Math.floor(Math.random() * pool.length)];
    document.getElementById('emoji').textContent = rand.emoji;
    document.getElementById('name').textContent = rand.name;
    document.getElementById('tags').innerHTML = '';
    ticks++;
    if (ticks >= totalTicks) {
      clearInterval(interval);
      const pick = pool[Math.floor(Math.random() * pool.length)];
      showResult(pick);
    }
  }, 70 + ticks * 5);
}

function showResult(pick) {
  const card = document.getElementById('slotCard');
  const btn = document.getElementById('spinBtn');
  const reroll = document.getElementById('rerollBtn');

  card.className = 'slot-card landed';
  document.getElementById('emoji').textContent = pick.emoji;
  document.getElementById('name').textContent = pick.name;
  document.getElementById('chuuniLine').textContent = randomPick(chuuniLines);

  const priceMap = { 
    low: ["💰 实惠", "price-low"], 
    mid: ["💰💰 适中", "price-mid"], 
    high: ["💰💰💰 奢华", "price-high"] 
  };
  const [priceLabel, priceClass] = priceMap[pick.price];
  
  let tagsHTML = `<span class="tag ${priceClass}">${priceLabel}</span>`;
  if (peopleCount === 2 && pick.duo) {
    tagsHTML += `<span class="tag share">👫 适合两人</span>`;
  }
  pick.tags.forEach(t => { tagsHTML += `<span class="tag">${t}</span>`; });
  document.getElementById('tags').innerHTML = tagsHTML;

  // Dog happy!
  setDogMood('happy');
  setDogSpeech(randomPick(dogSpeechResult));
  setTimeout(() => setDogMood(''), 2000);

  // Confetti!
  launchConfetti();

  // History
  history.unshift(pick);
  if (history.length > 6) history.pop();
  renderHistory();

  btn.classList.remove('is-spinning');
  btn.textContent = '⚡ 再来一次命运转转 ⚡';
  reroll.style.display = 'inline-block';
  isSpinning = false;
}

function renderHistory() {
  const section = document.getElementById('historySection');
  const list = document.getElementById('historyList');
  if (history.length < 2) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  list.innerHTML = history.map(h => 
    `<div class="history-item">${h.emoji} ${h.name}</div>`
  ).join('');
}

function randomPick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function launchConfetti() {
  const colors = ['#FF8A65','#FFB74D','#FFD54F','#AED581','#4FC3F7','#CE93D8','#F48FB1'];
  for (let i = 0; i < 25; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDelay = Math.random() * 0.5 + 's';
    c.style.animationDuration = (1.5 + Math.random()) + 's';
    c.style.width = (6 + Math.random() * 8) + 'px';
    c.style.height = (6 + Math.random() * 8) + 'px';
    c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 2500);
  }
}
